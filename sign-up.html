  <script>
    (function () {
      document.addEventListener('DOMContentLoaded', function () {
        var signupForm = document.getElementById('wf-form-Sign-Up');
        if (!signupForm) return;

        signupForm.addEventListener('keydown', function (event) {
          if (event.key === 'Enter') {
            event.preventDefault();
          }
        });
      });
    })();
  </script>
  <script src="assets/js/signup.js"></script>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var code   = params.get('code');
      if (code) {
        var field = document.getElementById('signup-referralCode');
        if (field) {
          field.value = code.trim();
          field.readOnly = true;
          field.style.background = '#f4f9ec';
          field.style.color = '#9d8248';
          field.style.fontWeight = '600';
          field.style.borderColor = 'rgba(65,83,38,0.35)';
          field.title = 'Referral code applied automatically';
        }
      }
    })();
