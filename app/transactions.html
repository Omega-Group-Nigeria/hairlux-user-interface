      justify-content: center;

      display: grid;
      grid-template-columns: 1.4fr repeat(2, minmax(0, 0.8fr));

    .transactions-input,

      background: #fff;
      color: #2d3622;
      font-size: 14px;
      padding: 10px 12px;
      outline: none;

    .transactions-input:focus,

      box-shadow: 0 0 0 3px rgba(180, 125, 45, 0.14);

      border-radius: 12px;
      overflow-x: auto;
      background: #fff;

      min-width: 860px;
      border-collapse: collapse;

    .transactions-table thead th {
      text-align: left;
      font-size: 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);

      border-bottom: 1px solid var(--border);

      color: #2d3622;

      max-width: 200px;
      word-break: break-word;
      white-space: normal;
    }

    .transactions-table tbody td:nth-child(1) { max-width: 220px; }
    .transactions-table tbody td:nth-child(2) { max-width: 160px; }
    .transactions-table tbody td:nth-child(3) { max-width: 90px; }
    .transactions-table tbody td:nth-child(4) { max-width: 100px; }
    .transactions-table tbody td:nth-child(5) { max-width: 110px; white-space: nowrap; }
    .transactions-table tbody td:nth-child(6) { max-width: 140px; }

    .transactions-table tbody tr:last-child td {
      border-bottom: none;
    }

      color: var(--primary);

    }

    .tx-sub {

      font-weight: 700;

      letter-spacing: 0.03em;

      color: #b9483b;

    .tx-pill.status-completed {

      color: #227a43;
      border-color: #ccebd7;
    }

    .tx-pill.status-pending {
      background: #fff8e9;
      color: #9a6a09;
      border-color: #f1dfb3;
    }

    .tx-pill.status-failed {
      background: #fff2f2;
      color: #b63b3b;

    }

      white-space: nowrap;
      color: #2d3622;

    .tx-amount.credit {
      color: #2d3622;
    }

    .tx-amount.debit {
      color: #2d3622;
    }

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const state = {
        all: [],
        filtered: [],
        page: 1,
        pageSize: 8,
        search: '',
        type: 'all',
        status: 'all'
      };

      const txSearch = document.getElementById('txSearch');
      const txTypeFilter = document.getElementById('txTypeFilter');
      const txStatusFilter = document.getElementById('txStatusFilter');
      const txTableBody = document.getElementById('txTableBody');
      const txPaginationInfo = document.getElementById('txPaginationInfo');
      const txPrevPage = document.getElementById('txPrevPage');
      const txNextPage = document.getElementById('txNextPage');
      const txPageNumbers = document.getElementById('txPageNumbers');

      function formatAmount(value, type) {
        const sign = type === 'debit' ? '-' : '';
        return `${sign}₦${Number(value || 0).toLocaleString()}`;
      }

      function formatDate(dateStr) {
        const d = new Date(dateStr);
        return d.toLocaleString('en-NG', {
          year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
        });
      }

      function normalizeTx(tx) {
        return {
          id: tx.id || tx.transactionId || `tx_${Math.random().toString(36).slice(2, 8)}`,
          createdAt: tx.createdAt || tx.date || new Date().toISOString(),
          description: tx.description || tx.title || tx.narration || 'Transaction',
          type: String(tx.type || '').toLowerCase() === 'credit' ? 'credit' : 'debit',
          status: (tx.status || 'successful').toString().toLowerCase(),
          amount: Number(tx.amount || 0),
          reference: tx.reference || tx.ref || tx.id || '-'
        };
      }

      async function loadTransactions() {
        try {
          if (typeof WalletAPI === 'undefined') {
            state.all = [];
            if (typeof UIHelper !== 'undefined') {
              UIHelper.showToast('Wallet helper not loaded.', 'error');
            }
            return;
          }

          const result = await WalletAPI.getTransactions({ page: 1, limit: 20 });
          const rows = Array.isArray(result.transactions) ? result.transactions : [];

          state.all = rows.length ? rows.map(normalizeTx) : [];
        } catch (error) {
          state.all = [];
          if (typeof UIHelper !== 'undefined') {
            const message = Array.isArray(error && error.message)
              ? error.message.join(', ')
              : ((error && error.message) || 'Unable to load transactions from server.');
            UIHelper.showToast(message, 'error');
          }
        }
      }

      function applyFilters() {
        const q = state.search.trim().toLowerCase();

        state.filtered = state.all.filter((tx) => {
          const matchType = state.type === 'all' || tx.type === state.type;
          const matchStatus = state.status === 'all' || tx.status === state.status;
          const hay = `${tx.description} ${tx.reference} ${formatDate(tx.createdAt)}`.toLowerCase();
          const matchSearch = !q || hay.includes(q);
          return matchType && matchStatus && matchSearch;
        });

        const totalPages = Math.max(1, Math.ceil(state.filtered.length / state.pageSize));
        if (state.page > totalPages) state.page = totalPages;
      }

      function renderRows() {
        if (!state.filtered.length) {
          txTableBody.innerHTML = `<tr><td colspan="6" class="empty-state">No transactions....</td></tr>`;
          return;
        }

        const start = (state.page - 1) * state.pageSize;
        const pageRows = state.filtered.slice(start, start + state.pageSize);

        txTableBody.innerHTML = pageRows.map((tx) => `
          <tr>
            <td>
              <div class="tx-description">${tx.description}</div>
            </td>
            <td>${tx.reference}</td>
            <td><span class="tx-pill type-${tx.type}">${tx.type}</span></td>
            <td><span class="tx-pill status-${tx.status}">${tx.status}</span></td>
            <td class="tx-amount ${tx.type}">${formatAmount(tx.amount, tx.type)}</td>
            <td>${formatDate(tx.createdAt)}</td>
          </tr>
        `).join('');
      }

      function renderPagination() {
        const total = state.filtered.length;
        const totalPages = Math.max(1, Math.ceil(total / state.pageSize));
        const start = total ? ((state.page - 1) * state.pageSize) + 1 : 0;
        const end = Math.min(state.page * state.pageSize, total);

        txPaginationInfo.textContent = `Showing ${start}-${end} of ${total} transactions`;

        txPrevPage.disabled = state.page <= 1;
        txNextPage.disabled = state.page >= totalPages;

        const pages = [];
        const from = Math.max(1, state.page - 1);
        const to = Math.min(totalPages, state.page + 1);
        for (let p = from; p <= to; p += 1) {
          pages.push(`<button type="button" class="page-btn ${p === state.page ? 'active' : ''}" data-page="${p}">${p}</button>`);
        }
        txPageNumbers.innerHTML = pages.join('');
      }

      function render() {
        applyFilters();
        renderRows();
        renderPagination();
      }

      txSearch.addEventListener('input', function () {
        state.search = this.value || '';
        state.page = 1;
        render();
      });

      txTypeFilter.addEventListener('change', function () {
        state.type = this.value;
        state.page = 1;
        render();
      });

      txStatusFilter.addEventListener('change', function () {
        state.status = this.value;
        state.page = 1;
        render();
      });

      txPrevPage.addEventListener('click', function () {
        if (state.page > 1) {
          state.page -= 1;
          render();
        }
      });

      txNextPage.addEventListener('click', function () {
        const totalPages = Math.max(1, Math.ceil(state.filtered.length / state.pageSize));
        if (state.page < totalPages) {
          state.page += 1;
          render();
        }
      });

      txPageNumbers.addEventListener('click', function (e) {
        const btn = e.target.closest('[data-page]');
        if (!btn) return;
        const page = Number(btn.getAttribute('data-page'));
        if (!Number.isNaN(page)) {
          state.page = page;
          render();
        }
      });

      txTableBody.innerHTML = '<tr><td colspan="6" class="empty-state">Loading transactions...</td></tr>';
      loadTransactions().then(render);
    });
  </script>
